<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ZapFiles</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./assets/favicon.ico">
</head>
<body>

<div class="pages">
    <div id="main" class="page hidden">
        <div class="title">
            <img class="logo" src="./assets/logo.png" height="128"/>
            <h1>ZapFiles</h1>
        </div>
        <h3 class="pageInfo">Select mode</h3>
        <div class="modeSelector">
            <button id="hostMode" onclick="change_page('host')">Host Files</button>
            <button id="getMode" onclick="change_page('get')">Get Files</button>
        </div>
    </div>
    <div id="host" class="page hidden">
        <div class="title">
            <img class="logo" src="./assets/logo.png" height="128"/>
            <h1>ZapFiles</h1>
        </div>
        <h3 class="pageInfo">Host Files</h3>

        <div class="form">
            <input type="text" placeholder="Filename" id="filename">
            <input type="number" min="0" max="65536" placeholder="Port" id="port">

            <select id="networkType">
                <option value="public">Public</option>
                <option value="local">Local</option>
            </select>
        </div>

        <div class="modeSelector">
            <button>Host</button>
            <button onclick="change_page('main')">Back</button>
        </div>
    </div>
    <div id="get" class="page hidden">
        <div class="title">
            <img class="logo" src="./assets/logo.png" height="128"/>
            <h1>ZapFiles</h1>
        </div>
        <h3 class="pageInfo">Get Files</h3>

        <div class="form">
            <input placeholder="Server key" id="serverKey">
        </div>

        <div class="modeSelector">
            <button>Download</button>
            <button onclick="change_page('main')">Back</button>
        </div>
    </div>
</div>


<script src="eel.js"></script>
<script src="script.js"></script>
</body>
</html>
